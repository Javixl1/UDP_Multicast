[Identity]
Role=RECEIVER                    ; RECEIVER (PC)
NodeID=RT-Node-01              ; ID único por dispositivo

[Network]
MulticastGroup=224.0.1.100
Port=5000
LocalInterface=                ; vacío = automático, o "192.168.1.100"
TTL=5                          ; ignorado en RECEIVER

[Receiver]
SocketTimeoutMs=100            ; timeout no bloqueante (solo RECEIVER)
FilterNodeID=                  ; vacío = acepta todos, o "RT-Node-01"
WatchdogTimeoutMs=500          ; alerta si no llegan datos

[Diagnostics]
LogEnabled=TRUE
LogPath=.\logs\udp_comm.log